name: Agente Prodotti — Aggiornamento Automatico

on:
  schedule:
    # Ogni giorno alle 08:00 (ora italiana)
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update-products:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install requests beautifulsoup4

      - name: Esegui agente ricerca prodotti
        run: python3 scripts/agent_products.py || echo "⚠️ Feed non disponibile, mantengo catalogo corrente"
        env:
          AMAZON_TAG: ${{ secrets.AMAZON_TAG }}

      - name: Commit aggiornamento prodotti
        run: |
          git config user.name "EmporiumBot"
          git config user.email "bot@emporiumonline.it"
          git add js/products.js
          git diff --staged --quiet || git commit -m "🤖 Aggiornamento automatico prodotti [$(date '+%d/%m/%Y')]"
          git push origin HEAD:${GITHUB_REF_NAME} || echo "::warning::Push non riuscito (permessi/branch protection)"

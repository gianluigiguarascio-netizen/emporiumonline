name: Agente Prodotti — Aggiornamento Automatico

on:
  schedule:
    # Ogni giorno alle 08:00 UTC (10:00 ora italiana)
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: 'Numero di prodotti da importare'
        required: false
        default: '5'
      use_api:
        description: 'Forza uso PA API (true/false)'
        required: false
        default: 'auto'

jobs:
  update-products:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Esegui agente importazione prodotti
        env:
          # Tag affiliato — cambia in GitHub Secrets se diverso
          AMAZON_PARTNER_TAG: ${{ secrets.AMAZON_PARTNER_TAG || 'prezzotop08-21' }}
          AMAZON_TAG: ${{ secrets.AMAZON_TAG || 'prezzotop08-21' }}
          # PA API — configura in GitHub Secrets > Settings > Secrets
          AMAZON_ACCESS_KEY: ${{ secrets.AMAZON_ACCESS_KEY }}
          AMAZON_SECRET_KEY: ${{ secrets.AMAZON_SECRET_KEY }}
          AMAZON_MARKETPLACE: ${{ secrets.AMAZON_MARKETPLACE || 'IT' }}
          AMAZON_HOST: ${{ secrets.AMAZON_HOST || 'webservices.amazon.it' }}
          AMAZON_REGION: ${{ secrets.AMAZON_REGION || 'eu-west-1' }}
        run: |
          COUNT=${{ github.event.inputs.count || '5' }}
          echo "Importazione $COUNT prodotti..."
          python scripts/agent_products.py --count $COUNT

      - name: Commit aggiornamento prodotti
        run: |
          git config user.name "EmporiumBot"
          git config user.email "bot@emporiumonline.it"
          git add data/products.json data/import_log.json js/products.js
          if git diff --staged --quiet; then
            echo "Nessuna modifica da committare"
          else
            git commit -m "chore: aggiornamento automatico prodotti $(date '+%Y-%m-%d')"
            git push
          fi
